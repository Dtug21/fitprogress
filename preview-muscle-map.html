<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitProgress — Mapa Muscular</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0F1923; font-family: -apple-system, sans-serif; color: #fff; padding: 16px; }

  h1 { color: #E6F4FE; font-size: 18px; font-weight: 800; margin-bottom: 4px; }
  p  { color: #7A9BB5; font-size: 13px; margin-bottom: 20px; }

  .selector { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .chip {
    padding: 6px 14px; border-radius: 20px; border: 1px solid #2E4057;
    background: #1C2B3A; color: #7A9BB5; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .chip:hover { border-color: #38BDF8; color: #38BDF8; }
  .chip.active { background: #0F2A3A; border-color: #38BDF8; color: #38BDF8; }

  .viewer {
    display: flex; gap: 12px; align-items: flex-start; justify-content: center;
    flex-wrap: wrap;
  }
  .view-panel { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .svg-box {
    background: #0A1520; border-radius: 14px; padding: 8px;
    border: 1px solid #2A3A4A;
  }
  .view-label { color: #4A6A8A; font-size: 9px; font-weight: 700; letter-spacing: 2px; }

  .legend { display: flex; flex-direction: column; gap: 10px; padding: 0 6px; }
  .legend-row { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 6px; }
  .legend-text { color: #7A9BB5; font-size: 13px; }

  .info-card {
    background: #1C2B3A; border-radius: 12px; border: 1px solid #2E4057;
    padding: 16px; margin-top: 20px;
  }
  .info-title { color: #CC1100; font-size: 14px; font-weight: 800; margin-bottom: 4px; }
  .info-secondary { color: #D97000; font-size: 13px; font-weight: 600; }
  .info-label { color: #4A6A8A; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
</style>
</head>
<body>

<h1>🏋️ FitProgress — Mapa Muscular</h1>
<p>Selecciona un grupo muscular para ver qué músculos trabaja</p>

<div class="selector">
  <div class="chip active" onclick="select(this,'chest')">Pecho</div>
  <div class="chip" onclick="select(this,'back')">Espalda</div>
  <div class="chip" onclick="select(this,'shoulders')">Hombros</div>
  <div class="chip" onclick="select(this,'biceps')">Bíceps</div>
  <div class="chip" onclick="select(this,'triceps')">Tríceps</div>
  <div class="chip" onclick="select(this,'quads')">Cuádriceps</div>
  <div class="chip" onclick="select(this,'hamstrings')">Isquios</div>
  <div class="chip" onclick="select(this,'glutes')">Glúteos</div>
  <div class="chip" onclick="select(this,'core')">Core/Abs</div>
  <div class="chip" onclick="select(this,'calves')">Gemelos</div>
</div>

<div class="viewer">
  <div class="view-panel">
    <div class="svg-box" id="front-box"></div>
    <div class="view-label">FRONTAL</div>
  </div>

  <div class="legend">
    <div class="legend-row"><div class="legend-dot" style="background:#CC1100"></div><span class="legend-text">Principal</span></div>
    <div class="legend-row"><div class="legend-dot" style="background:#D97000"></div><span class="legend-text">Secundario</span></div>
    <div class="legend-row"><div class="legend-dot" style="background:#5A3A28"></div><span class="legend-text">Inactivo</span></div>
  </div>

  <div class="view-panel">
    <div class="svg-box" id="back-box"></div>
    <div class="view-label">POSTERIOR</div>
  </div>
</div>

<div class="info-card" id="info-card">
  <div class="info-label">Músculo Principal</div>
  <div class="info-title" id="info-primary">—</div>
  <div class="info-label" style="margin-top:10px">Músculos Secundarios</div>
  <div class="info-secondary" id="info-secondary">—</div>
</div>

<script>
// ─── Datos ───────────────────────────────────────────────────────────────────
const SKIN = '#C8956C', SKIN_D = '#A67248', SKIN_M = '#B5804E';
const PRI = '#CC1100', PRI_H = '#FF4433';
const SEC = '#D97000', SEC_H = '#FFAA22';
const OFF = '#8B6048', OFF_S = '#6B4828';

const MUSCLE_LABELS = {
  chest:'Pectoral mayor', back:'Dorsal ancho / Trapecio', shoulders:'Deltoides',
  biceps:'Bíceps braquial', triceps:'Tríceps braquial', quads:'Cuádriceps',
  hamstrings:'Isquiotibiales', glutes:'Glúteo mayor', core:'Recto abdominal',
  calves:'Gastrocnemio'
};

const FRONT_MAP = {
  chest:['pec','ant_delt'], shoulders:['ant_delt','trap_f'], biceps:['bicep','forearm_f'],
  triceps:[], back:['lat'], quads:['quad'], legs:['quad','shin'], hamstrings:[],
  glutes:[], calves:['shin'], core:['abs','oblique'], cardio:['quad','abs'],
  full_body:['pec','ant_delt','abs','quad'],
};
const BACK_MAP = {
  back:['lat','trap_b','erector','infra'], shoulders:['trap_b','post_delt'],
  triceps:['tricep'], biceps:['forearm_b'], chest:[], glutes:['glute'],
  hamstrings:['hamstring','calf'], legs:['glute','hamstring','calf'],
  calves:['calf'], core:['erector'], cardio:['glute','hamstring'],
  full_body:['trap_b','lat','glute','hamstring'],
};

const SECONDARY_LABELS = {
  chest:{front:['Deltoides ant.','Tríceps'],back:[]},
  back:{front:[],back:['Romboides','Bíceps','Erector']},
  shoulders:{front:['Trapecio'],back:['Trapecio','Infraespinoso']},
  biceps:{front:['Braquial','Antebrazo'],back:[]},
  triceps:{front:[],back:['Deltoides post.','Antebrazo']},
  quads:{front:['Tibial ant.'],back:[]},
  hamstrings:{front:[],back:['Glúteo','Gemelo']},
  glutes:{front:[],back:['Isquiotibiales','Lumbar']},
  core:{front:['Oblicuos'],back:['Erector espinal']},
  calves:{front:['Tibial ant.'],back:['Sóleo']},
};

let currentMuscle = 'chest';

function state(name, primary, map) {
  if ((map[primary]||[]).includes(name)) return 'primary';
  return 'off';
}

function gc(s) {
  if (s==='primary') return PRI;
  if (s==='secondary') return SEC;
  return OFF;
}
function gs(s) {
  if (s==='primary') return PRI_H;
  if (s==='secondary') return SEC_H;
  return OFF_S;
}
function sw(s) { return s==='off' ? 0.5 : 1.5; }
function op(s) { return s==='off' ? 0.55 : 1; }

function grad(id, s, cx='50%', cy='35%') {
  const c0 = s==='primary' ? PRI_H : s==='secondary' ? SEC_H : SKIN_M;
  const c1 = s==='primary' ? PRI   : s==='secondary' ? SEC   : SKIN_D;
  return `<radialGradient id="${id}" cx="${cx}" cy="${cy}" r="62%">
    <stop offset="0%" stop-color="${c0}"/>
    <stop offset="100%" stop-color="${c1}"/>
  </radialGradient>`;
}

function muscle(d, gradId, s) {
  return `<path d="${d}" fill="${s==='off'?OFF:`url(#${gradId})`}" stroke="${gs(s)}" stroke-width="${sw(s)}" opacity="${op(s)}"/>`;
}

function label(tx, ty, lx, ly, text, side) {
  const anchor = side==='left' ? 'end' : 'start';
  return `<g>
    <line x1="${tx}" y1="${ty}" x2="${lx}" y2="${ly}" stroke="#fff" stroke-width="0.7" opacity="0.6"/>
    <circle cx="${lx}" cy="${ly}" r="2" fill="${PRI}"/>
    <text x="${tx}" y="${ty+3}" font-size="8.5" fill="#fff" font-weight="bold" text-anchor="${anchor}" font-family="-apple-system,sans-serif" opacity="0.95">${text}</text>
  </g>`;
}

// ─── SVG Frontal ─────────────────────────────────────────────────────────────
function buildFront(m) {
  const pec = state('pec', m, FRONT_MAP);
  const delt = state('ant_delt', m, FRONT_MAP);
  const bicep = state('bicep', m, FRONT_MAP);
  const forearm = state('forearm_f', m, FRONT_MAP);
  const abs = state('abs', m, FRONT_MAP);
  const obl = state('oblique', m, FRONT_MAP);
  const quad = state('quad', m, FRONT_MAP);
  const shin = state('shin', m, FRONT_MAP);
  const trapF = state('trap_f', m, FRONT_MAP);

  const defs = `<defs>
    ${grad('gPec', pec,'45%','35%')}
    ${grad('gDelt', delt,'40%','30%')}
    ${grad('gBicep', bicep)}
    ${grad('gForearm', forearm)}
    ${grad('gAbs', abs)}
    ${grad('gObl', obl)}
    ${grad('gQuad', quad,'50%','35%')}
    ${grad('gShin', shin)}
    ${grad('gTrapF', trapF)}
    <linearGradient id="skinBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="${SKIN_D}"/>
      <stop offset="45%" stop-color="${SKIN}"/>
      <stop offset="55%" stop-color="${SKIN}"/>
      <stop offset="100%" stop-color="${SKIN_D}"/>
    </linearGradient>
  </defs>`;

  // Cuerpo base
  const body = `
    <ellipse cx="90" cy="28" rx="22" ry="26" fill="url(#skinBody)" stroke="${SKIN_D}" stroke-width="0.8"/>
    <ellipse cx="68" cy="28" rx="4" ry="6" fill="${SKIN}" stroke="${SKIN_D}" stroke-width="0.5"/>
    <ellipse cx="112" cy="28" rx="4" ry="6" fill="${SKIN}" stroke="${SKIN_D}" stroke-width="0.5"/>
    <path d="M80,52 Q90,58 100,52 L102,68 Q90,74 78,68 Z" fill="${SKIN}" stroke="${SKIN_D}" stroke-width="0.6"/>
    <path d="M38,84 Q28,94 26,112 L24,148 Q22,158 24,164 L28,168 L30,196 L32,214 Q36,220 44,220 L54,220 Q60,216 60,210 L62,194 L62,176 Q56,172 52,164 L48,140 Q52,130 54,112 Q60,96 72,88 L90,84 L108,88 Q120,96 126,112 L128,140 L124,164 Q120,172 118,176 L118,194 L120,210 Q120,216 126,220 L136,220 Q144,220 148,214 L150,196 L152,168 L156,164 Q158,158 156,148 L154,112 Q152,94 142,84 Z" fill="url(#skinBody)" stroke="${SKIN_D}" stroke-width="0.8"/>
    <path d="M28,92 Q18,104 16,120 L14,148 Q14,158 18,162 L28,164 L30,138 L30,114 L32,96 Z" fill="${SKIN}" stroke="${SKIN_D}" stroke-width="0.7"/>
    <path d="M16,160 Q12,174 14,192 L16,210 L30,208 L30,190 L28,170 Z" fill="${SKIN}" stroke="${SKIN_D}" stroke-width="0.7"/>
    <path d="M152,92 Q162,104 164,120 L166,148 Q166,158 162,162 L152,164 L150,138 L150,114 L148,96 Z" fill="${SKIN}" stroke="${SKIN_D}" stroke-width="0.7"/>
    <path d="M164,160 Q168,174 166,192 L164,210 L150,208 L150,190 L152,170 Z" fill="${SKIN}" stroke="${SKIN_D}" stroke-width="0.7"/>
    <path d="M44,222 L38,298 L36,334 Q36,342 38,348 L38,372 L60,372 L62,348 Q64,342 64,334 L66,300 L68,224 Z" fill="${SKIN}" stroke="${SKIN_D}" stroke-width="0.8"/>
    <path d="M136,222 L142,298 L144,334 Q144,342 142,348 L142,372 L120,372 L118,348 Q116,342 116,334 L114,300 L112,224 Z" fill="${SKIN}" stroke="${SKIN_D}" stroke-width="0.8"/>
  `;

  // Músculos
  const muscles = `
    ${muscle('M78,68 Q70,72 62,82 L70,88 Q80,82 82,74 Z','gTrapF',trapF)}
    ${muscle('M102,68 Q110,72 118,82 L110,88 Q100,82 98,74 Z','gTrapF',trapF)}
    ${muscle('M54,92 Q44,104 46,122 Q50,138 64,144 L88,148 Q94,140 92,124 Q88,106 78,96 L64,88 Z','gPec',pec)}
    ${muscle('M126,92 Q136,104 134,122 Q130,138 116,144 L92,148 Q86,140 88,124 Q92,106 102,96 L116,88 Z','gPec',pec)}
    ${muscle('M30,96 Q22,108 22,124 L32,126 Q36,114 40,104 Z','gDelt',delt)}
    ${muscle('M150,96 Q158,108 158,124 L148,126 Q144,114 140,104 Z','gDelt',delt)}
    ${muscle('M18,122 Q12,136 12,154 L16,164 L30,162 Q30,144 30,128 Z','gBicep',bicep)}
    ${muscle('M162,122 Q168,136 168,154 L164,164 L150,162 Q150,144 150,128 Z','gBicep',bicep)}
    ${muscle('M14,164 Q10,178 12,196 L14,208 L30,206 L30,190 L28,164 Z','gForearm',forearm)}
    ${muscle('M166,164 Q170,178 168,196 L166,208 L150,206 L150,190 L152,164 Z','gForearm',forearm)}
    ${[0,1,2].map(r=>[0,1].map(c=>{
      const x=76+c*14, y=152+r*16;
      return `<rect x="${x}" y="${y}" width="12" height="13" rx="3" fill="${abs==='off'?OFF:`url(#gAbs)`}" stroke="${gs(abs)}" stroke-width="${sw(abs)}" opacity="${op(abs)}"/>`;
    }).join('')).join('')}
    <path d="M90,150 L90,200" stroke="${SKIN_D}" stroke-width="1" opacity="0.35"/>
    ${muscle('M64,150 Q58,168 60,194 L72,198 L76,182 L78,150 Z','gObl',obl)}
    ${muscle('M116,150 Q122,168 120,194 L108,198 L104,182 L102,150 Z','gObl',obl)}
    ${muscle('M44,224 Q38,248 36,278 L38,310 L66,312 L68,280 L70,248 L68,224 Z','gQuad',quad)}
    ${muscle('M50,302 Q46,314 52,322 L66,322 L68,310 Z','gQuad',quad)}
    ${muscle('M136,224 Q142,248 144,278 L142,310 L114,312 L112,280 L110,248 L112,224 Z','gQuad',quad)}
    ${muscle('M130,302 Q134,314 128,322 L114,322 L112,310 Z','gQuad',quad)}
    ${muscle('M38,328 Q34,344 36,360 L38,370 L56,368 L58,354 L60,330 Z','gShin',shin)}
    ${muscle('M142,328 Q146,344 144,360 L142,370 L124,368 L122,354 L120,330 Z','gShin',shin)}
  `;

  // Etiquetas solo cuando activos
  const lbls = [];
  if(pec!=='off')     lbls.push(label(16,108,56,116,'Pectoral','left'));
  if(delt!=='off')    lbls.push(label(14,94,38,100,'Deltoides ant.','left'));
  if(bicep!=='off')   lbls.push(label(10,136,22,138,'Bíceps','left'));
  if(abs!=='off')     lbls.push(label(20,165,74,165,'Abdominales','left'));
  if(obl!=='off')     lbls.push(label(14,182,60,178,'Oblicuo','left'));
  if(quad!=='off')    lbls.push(label(170,258,122,262,'Cuádriceps','right'));
  if(shin!=='off')    lbls.push(label(170,320,126,316,'Tibial ant.','right'));
  if(trapF!=='off')   lbls.push(label(170,88,112,90,'Trapecio','right'));
  if(forearm!=='off') lbls.push(label(170,186,140,186,'Antebrazo','right'));

  return `<svg width="180" height="380" viewBox="0 0 180 380" xmlns="http://www.w3.org/2000/svg">${defs}${body}${muscles}${lbls.join('')}</svg>`;
}

// ─── SVG Posterior ───────────────────────────────────────────────────────────
function buildBack(m) {
  const trap    = state('trap_b', m, BACK_MAP);
  const postD   = state('post_delt', m, BACK_MAP);
  const infra   = state('infra', m, BACK_MAP);
  const lat     = state('lat', m, BACK_MAP);
  const tricep  = state('tricep', m, BACK_MAP);
  const forearm = state('forearm_b', m, BACK_MAP);
  const erect   = state('erector', m, BACK_MAP);
  const glute   = state('glute', m, BACK_MAP);
  const hamst   = state('hamstring', m, BACK_MAP);
  const calf    = state('calf', m, BACK_MAP);

  const defs = `<defs>
    ${grad('gTrap',trap)} ${grad('gPostD',postD,'45%','35%')}
    ${grad('gInfra',infra)} ${grad('gLat',lat,'45%','30%')}
    ${grad('gTricep',tricep)} ${grad('gForearmB',forearm)}
    ${grad('gErect',erect)} ${grad('gGlute',glute,'50%','35%')}
    ${grad('gHamst',hamst)} ${grad('gCalf',calf,'50%','30%')}
    <linearGradient id="skinBodyB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="${SKIN_D}"/>
      <stop offset="45%" stop-color="${SKIN}"/>
      <stop offset="55%" stop-color="${SKIN}"/>
      <stop offset="100%" stop-color="${SKIN_D}"/>
    </linearGradient>
  </defs>`;

  const body = `
    <ellipse cx="90" cy="28" rx="22" ry="26" fill="url(#skinBodyB)" stroke="${SKIN_D}" stroke-width="0.8"/>
    <ellipse cx="68" cy="28" rx="4" ry="6" fill="${SKIN}" stroke="${SKIN_D}" stroke-width="0.5"/>
    <ellipse cx="112" cy="28" rx="4" ry="6" fill="${SKIN}" stroke="${SKIN_D}" stroke-width="0.5"/>
    <path d="M80,52 Q90,58 100,52 L102,68 Q90,74 78,68 Z" fill="${SKIN}" stroke="${SKIN_D}" stroke-width="0.6"/>
    <path d="M38,84 Q28,94 26,112 L24,148 Q22,158 24,164 L28,168 L30,196 L32,214 Q36,220 44,220 L54,220 Q60,216 60,210 L62,194 L62,176 Q56,172 52,164 L48,140 Q52,130 54,112 Q60,96 72,88 L90,84 L108,88 Q120,96 126,112 L128,140 L124,164 Q120,172 118,176 L118,194 L120,210 Q120,216 126,220 L136,220 Q144,220 148,214 L150,196 L152,168 L156,164 Q158,158 156,148 L154,112 Q152,94 142,84 Z" fill="url(#skinBodyB)" stroke="${SKIN_D}" stroke-width="0.8"/>
    <path d="M28,92 Q18,104 16,120 L14,148 Q14,158 18,162 L28,164 L30,138 L30,114 L32,96 Z" fill="${SKIN}" stroke="${SKIN_D}" stroke-width="0.7"/>
    <path d="M16,160 Q12,174 14,192 L16,210 L30,208 L30,190 L28,170 Z" fill="${SKIN}" stroke="${SKIN_D}" stroke-width="0.7"/>
    <path d="M152,92 Q162,104 164,120 L166,148 Q166,158 162,162 L152,164 L150,138 L150,114 L148,96 Z" fill="${SKIN}" stroke="${SKIN_D}" stroke-width="0.7"/>
    <path d="M164,160 Q168,174 166,192 L164,210 L150,208 L150,190 L152,170 Z" fill="${SKIN}" stroke="${SKIN_D}" stroke-width="0.7"/>
    <path d="M44,222 L38,298 L36,334 Q36,342 38,348 L38,372 L60,372 L62,348 Q64,342 64,334 L66,300 L68,224 Z" fill="${SKIN}" stroke="${SKIN_D}" stroke-width="0.8"/>
    <path d="M136,222 L142,298 L144,334 Q144,342 142,348 L142,372 L120,372 L118,348 Q116,342 116,334 L114,300 L112,224 Z" fill="${SKIN}" stroke="${SKIN_D}" stroke-width="0.8"/>
  `;

  const muscles = `
    ${muscle('M78,68 Q68,72 54,84 L44,96 Q56,114 64,124 L90,130 L116,124 Q124,114 136,96 L126,84 Q112,72 102,68 Z','gTrap',trap)}
    ${muscle('M28,94 Q20,106 20,122 L32,124 L36,112 L40,98 Z','gPostD',postD)}
    ${muscle('M152,94 Q160,106 160,122 L148,124 L144,112 L140,98 Z','gPostD',postD)}
    ${muscle('M40,106 Q34,118 36,132 L50,136 Q56,128 58,116 L58,106 Z','gInfra',infra)}
    ${muscle('M140,106 Q146,118 144,132 L130,136 Q124,128 122,116 L122,106 Z','gInfra',infra)}
    ${muscle('M26,110 Q18,128 18,154 L22,170 L52,180 L58,158 L56,130 L44,110 Z','gLat',lat)}
    ${muscle('M154,110 Q162,128 162,154 L158,170 L128,180 L122,158 L124,130 L136,110 Z','gLat',lat)}
    ${muscle('M80,132 Q78,154 80,176 L88,178 L90,130 Z','gErect',erect)}
    ${muscle('M100,132 Q102,154 100,176 L92,178 L90,130 Z','gErect',erect)}
    ${muscle('M20,124 Q14,138 16,156 L22,164 L36,160 L38,140 Z','gTricep',tricep)}
    ${muscle('M160,124 Q166,138 164,156 L158,164 L144,160 L142,140 Z','gTricep',tricep)}
    ${muscle('M16,162 Q12,176 14,194 L16,208 L30,206 L30,190 L28,166 Z','gForearmB',forearm)}
    ${muscle('M164,162 Q168,176 166,194 L164,208 L150,206 L150,190 L152,166 Z','gForearmB',forearm)}
    ${muscle('M44,222 Q34,234 32,252 Q32,268 42,276 L68,278 L70,252 L70,222 Z','gGlute',glute)}
    ${muscle('M136,222 Q146,234 148,252 Q148,268 138,276 L112,278 L110,252 L110,222 Z','gGlute',glute)}
    ${muscle('M38,278 Q32,298 32,326 L36,342 L66,342 L68,326 L70,298 L70,278 Z','gHamst',hamst)}
    ${muscle('M142,278 Q148,298 148,326 L144,342 L114,342 L112,326 L110,298 L110,278 Z','gHamst',hamst)}
    ${muscle('M36,344 Q32,358 36,370 L52,370 L54,356 L52,344 Z','gCalf',calf)}
    ${muscle('M54,344 Q52,358 54,372 L66,372 L66,356 L64,344 Z','gCalf',calf)}
    ${muscle('M144,344 Q148,358 144,370 L128,370 L126,356 L128,344 Z','gCalf',calf)}
    ${muscle('M126,344 Q128,358 126,372 L114,372 L114,356 L116,344 Z','gCalf',calf)}
  `;

  const lbls = [];
  if(trap!=='off')   lbls.push(label(16,88,62,90,'Trapecio','left'));
  if(postD!=='off')  lbls.push(label(10,104,28,108,'Deltoides post.','left'));
  if(infra!=='off')  lbls.push(label(10,122,38,124,'Infraespinoso','left'));
  if(lat!=='off')    lbls.push(label(10,148,26,150,'Dorsal ancho','left'));
  if(tricep!=='off') lbls.push(label(10,138,20,144,'Tríceps','left'));
  if(glute!=='off')  lbls.push(label(170,238,128,240,'Glúteo','right'));
  if(hamst!=='off')  lbls.push(label(170,278,130,278,'Isquiotibiales','right'));
  if(calf!=='off')   lbls.push(label(170,330,136,332,'Gemelo','right'));
  if(erect!=='off')  lbls.push(label(170,170,104,168,'Erector','right'));

  return `<svg width="180" height="380" viewBox="0 0 180 380" xmlns="http://www.w3.org/2000/svg">${defs}${body}${muscles}${lbls.join('')}</svg>`;
}

// ─── Control ─────────────────────────────────────────────────────────────────
function select(el, muscle) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentMuscle = muscle;
  render();
}

function render() {
  document.getElementById('front-box').innerHTML = buildFront(currentMuscle);
  document.getElementById('back-box').innerHTML  = buildBack(currentMuscle);
  document.getElementById('info-primary').textContent = MUSCLE_LABELS[currentMuscle] || currentMuscle;
  const sec = SECONDARY_LABELS[currentMuscle];
  const all = sec ? [...(sec.front||[]), ...(sec.back||[])].join(', ') : '—';
  document.getElementById('info-secondary').textContent = all || '—';
}

render();
</script>
</body>
</html>

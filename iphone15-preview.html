<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FitProgress — iPhone 15</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #0f0f12;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #a1a1aa;
      padding: 24px;
    }
    h1 {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .phone {
      position: relative;
      width: 393px;
      height: 852px;
      border-radius: 52px;
      background: #1c1c1e;
      padding: 12px;
      box-shadow:
        0 0 0 2px #3a3a3c,
        0 24px 80px rgba(0, 0, 0, 0.55),
        inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }
    .screen {
      width: 100%;
      height: 100%;
      border-radius: 42px;
      overflow: hidden;
      background: #000;
      position: relative;
    }
    .dynamic-island {
      position: absolute;
      top: 11px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 37px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
      pointer-events: none;
    }
    iframe {
      width: 393px;
      height: 852px;
      border: 0;
      display: block;
      background: #fff;
    }
    .meta {
      font-size: 12px;
      text-align: center;
      line-height: 1.6;
    }
    .meta strong { color: #e4e4e7; font-weight: 500; }
  </style>
</head>
<body>
  <h1>FitProgress · emulación iPhone 15</h1>
  <div class="phone" aria-label="iPhone 15">
    <div class="screen">
      <div class="dynamic-island" aria-hidden="true"></div>
      <iframe
        src="http://localhost:8081"
        title="FitProgress"
        allow="clipboard-read; clipboard-write"
      ></iframe>
    </div>
  </div>
  <p class="meta">
    <strong>393 × 852</strong> pt · escala 3x · iOS Safari<br />
    Asegúrate de que el servidor esté en <strong>localhost:8081</strong>
  </p>
</body>
</html>
